- name: Configurar imagen base con MariaDB
  hosts: all
  become: true

  tasks:
    - name: Actualizar caché de apt
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Instalar dependencias básicas
      apt:
        name:
          - mariadb-server
          - mariadb-client
          - python3-pymysql
        state: present

    - name: Asegurar que MariaDB esté iniciado
      systemd:
        name: mariadb
        state: started
        enabled: true

    - name: Asegurar instalación segura básica (root sin password remoto)
      mysql_user:
        name: root
        host: localhost
        check_implicit_admin: true
        password: ""
        plugin: mysql_native_password
        state: present
      ignore_errors: true